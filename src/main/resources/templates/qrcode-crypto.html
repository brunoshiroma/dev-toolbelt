<meta th:replace="~{fragments/base_html_top.html}">
<h1>QR code crypto data transfer</h1>
<main role="main" class="container-fluid pt-3">
    <div class="row">
        <div class="col-lg-6">
            <h2>Create QR code</h2>
            <div class="form-group">
                <label for="qrcode-create-data">Data</label>
                <textarea id="qrcode-create-data" class="h-100 w-100"></textarea>
            </div>
            <div class="form-group">
                <label for="qrcode-create-salt">Salt</label>
                <input id="qrcode-create-salt" class="w-100">
            </div>
            <div class="form-group">
                <label for="qrcode-create-otp">OTP</label>
                <input id="qrcode-create-otp" class="w-100">
            </div>
            <div class="form-group">
                <label for="qrcode-create-payload">Encrypted payload</label>
                <textarea id="qrcode-create-payload" disabled class="h-100 w-100"></textarea>
            </div>
            <div class="row">
                <div class="col">
                    <button onclick="generateQrCode();" type="button" class="btn btn-primary m-1">
                        Generate QR code
                    </button>
                </div>
            </div>
            <div class="form-group">
                <img id="qrcode-create-image" alt="Generated QR code" class="img-fluid border">
            </div>
        </div>
        <div class="col-lg-6">
            <h2>Read QR code</h2>
            <div class="form-group">
                <label for="qrcode-read-file">QR code image</label>
                <input id="qrcode-read-file" type="file" accept="image/png,image/jpeg,image/webp" class="w-100">
            </div>
            <div class="form-group">
                <label for="qrcode-read-salt">Salt</label>
                <input id="qrcode-read-salt" class="w-100">
            </div>
            <div class="form-group">
                <label for="qrcode-read-otp">OTP</label>
                <input id="qrcode-read-otp" class="w-100">
            </div>
            <div class="form-group">
                <label for="qrcode-read-payload">Encrypted payload</label>
                <textarea id="qrcode-read-payload" disabled class="h-100 w-100"></textarea>
            </div>
            <div class="form-group">
                <label for="qrcode-read-output">Data</label>
                <textarea id="qrcode-read-output" disabled class="h-100 w-100"></textarea>
            </div>
            <div class="row">
                <div class="col">
                    <button onclick="readQrCode();" type="button" class="btn btn-primary m-1">
                        Read QR code
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/common.js"></script>
<script>
    async function generateQrCode() {
        const dataField = byId('qrcode-create-data');
        const saltField = byId('qrcode-create-salt');
        const otpField = byId('qrcode-create-otp');
        const payloadField = byId('qrcode-create-payload');
        const imageField = byId('qrcode-create-image');

        try {
            const response = await fetch('/api/qrcode-crypto/generate', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    data: dataField.value,
                    salt: saltField.value,
                    otp: otpField.value
                })
            });

            const data = await readResponseJson(response);
            payloadField.value = data.encryptedPayload;
            imageField.src = data.qrCodeDataUrl;
        } catch (error) {
            alert(error.message);
        }
    }

    async function readQrCode() {
        const fileField = byId('qrcode-read-file');
        const saltField = byId('qrcode-read-salt');
        const otpField = byId('qrcode-read-otp');
        const payloadField = byId('qrcode-read-payload');
        const outputField = byId('qrcode-read-output');

        if (!fileField.files.length) {
            alert('Choose a QR code image first');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileField.files[0]);
        formData.append('salt', saltField.value);
        formData.append('otp', otpField.value);

        try {
            const response = await fetch('/api/qrcode-crypto/read', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json'
                },
                body: formData
            });

            const data = await readResponseJson(response);
            payloadField.value = data.encryptedPayload;
            outputField.value = data.data;
        } catch (error) {
            alert(error.message);
        }
    }

    async function readResponseJson(response) {
        const responseText = await response.text();
        const data = responseText ? JSON.parse(responseText) : {};
        if (!response.ok) {
            throw new Error(data.message || 'Unexpected error');
        }

        return data;
    }
</script>

<meta th:replace="~{fragments/base_html_bottom.html}">
